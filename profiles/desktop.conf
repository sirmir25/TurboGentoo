# TurboGentoo — desktop profile
# Minimal + browser (firefox-bin), file manager (thunar), audio (pipewire),
# notifications (dunst/mako), screenshot tools.

TG_PROFILE="desktop"

# ── Hardware ─────────────────────────────────────────────────────────────────
TG_DISK="/dev/sda"
TG_BOOT_MODE="uefi"
TG_EFI_SIZE="512M"
TG_SWAP_SIZE="4G"
TG_FS_ROOT="ext4"

# ── System ───────────────────────────────────────────────────────────────────
TG_HOSTNAME="gentoo"
TG_TIMEZONE="Europe/Moscow"
TG_LOCALE="en_US.UTF-8"
TG_USERNAME="user"

# ── Portage ──────────────────────────────────────────────────────────────────
TG_MIRROR="https://distfiles.gentoo.org"
TG_STAGE3_VARIANT="openrc"
TG_USE_BINPKG="1"
TG_CFLAGS="-O2 -pipe -march=native"

# ── Kernel ───────────────────────────────────────────────────────────────────
TG_KERNEL_METHOD="dist-kernel"

# ── Desktop ──────────────────────────────────────────────────────────────────
TG_WM="i3"    # i3 | sway | openbox
