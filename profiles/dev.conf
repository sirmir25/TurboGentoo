# TurboGentoo — dev profile
# Desktop + git, neovim, build tools, optional language toolchains.

TG_PROFILE="dev"

# ── Hardware ─────────────────────────────────────────────────────────────────
TG_DISK="/dev/sda"
TG_BOOT_MODE="uefi"
TG_EFI_SIZE="512M"
TG_SWAP_SIZE="8G"       # More swap helps with heavy compilation
TG_FS_ROOT="ext4"

# ── System ───────────────────────────────────────────────────────────────────
TG_HOSTNAME="devbox"
TG_TIMEZONE="Europe/Moscow"
TG_LOCALE="en_US.UTF-8"
TG_USERNAME="dev"

# ── Portage ──────────────────────────────────────────────────────────────────
TG_MIRROR="https://distfiles.gentoo.org"
TG_STAGE3_VARIANT="openrc"
TG_USE_BINPKG="1"
# More aggressive optimisation for dev machines (knows the hardware)
TG_CFLAGS="-O2 -pipe -march=native -fstack-protector-strong"

# ── Kernel ───────────────────────────────────────────────────────────────────
TG_KERNEL_METHOD="dist-kernel"

# ── Desktop ──────────────────────────────────────────────────────────────────
TG_WM="i3"    # i3 | sway | openbox
