general {
    output_format = "i3bar"
    colors = true
    interval = 5
    color_good     = "#a6e3a1"
    color_degraded = "#f9e2af"
    color_bad      = "#f38ba8"
}

order += "cpu_usage"
order += "memory"
order += "disk /"
order += "ethernet _first_"
order += "wireless _first_"
order += "battery all"
order += "tztime local"

cpu_usage {
    format = " CPU %usage"
    max_threshold = 90
}

memory {
    format = " %used / %total"
    threshold_degraded = "1G"
    threshold_critical = "500M"
}

disk "/" {
    format = " %avail"
}

ethernet _first_ {
    format_up   = " %ip"
    format_down = " down"
}

wireless _first_ {
    format_up   = " %essid %quality"
    format_down = " down"
}

battery all {
    format = "%status %percentage %remaining"
    format_down = ""
    status_chr = ""
    status_bat = ""
    status_unk = "?"
    status_full = ""
    low_threshold = 15
}

tztime local {
    format = " %Y-%m-%d  %H:%M"
}
